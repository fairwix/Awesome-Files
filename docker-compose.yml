services:
  api:
    build:
      context: .
      dockerfile: AwesomeFiles.Api/Dockerfile
    container_name: awesomefiles-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - FileStorage__FolderPath=/app/Files
      - ArchiveStorage__FolderPath=/app/Archives
    ports:
      - "5001:80"
    volumes:
      - ./Files:/app/Files
      - ./Archives:/app/Archives
    networks:
      - awesomefiles-network
    depends_on:
      - logsdb

  logsdb:
    image: postgres:15-alpine
    container_name: awesomefiles-logsdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logsdb
    ports:
      - "5433:5432"
    volumes:
      - logs_data:/var/lib/postgresql/data
    networks:
      - awesomefiles-network

networks:
  awesomefiles-network:
    driver: bridge

volumes:
  logs_data: